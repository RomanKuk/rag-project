<div class="doc-list">
  @if (error()) {
    <p class="error">{{ error() }}</p>
  }
  @if (documents().length === 0) {
    <p class="empty">No documents ingested yet.</p>
  } @else {
    @for (name of documents(); track name) {
      <div class="doc-item">
        <span class="doc-name" [title]="name">{{ name }}</span>
        <button class="btn-delete"
                (click)="delete(name)"
                [disabled]="deleting() === name"
                title="Delete">
          {{ deleting() === name ? '…' : '×' }}
        </button>
      </div>
    }
  }
</div>
