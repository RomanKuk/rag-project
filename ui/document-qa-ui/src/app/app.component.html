@if (showShell()) {
  <div class="app-layout">
    <header class="app-header">
      <h1>Document Q&A</h1>
      <nav class="header-nav">
        @if (auth.isLoggedIn()) {
          @if (auth.role() === 'Owner') {
            <a routerLink="/owner" class="nav-link">Owner portal</a>
          }
          <span class="user-badge">{{ auth.currentUser()?.displayName }}</span>
          <button class="btn-nav" (click)="auth.logout()">Log out</button>
        } @else {
          <a routerLink="/login" class="nav-link">Sign in</a>
        }
        <app-document-upload (uploaded)="onUploaded()" />
      </nav>
    </header>

    <div class="app-body">
      <aside class="sidebar">
        <p class="sidebar-title">Documents</p>
        <app-document-list />
      </aside>
      <main class="app-main">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <router-outlet />
}

<style>
  .app-layout { display: flex; flex-direction: column; height: 100vh; }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #1a1a2e;
    color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }

  .app-header h1 { font-size: 1.1rem; font-weight: 600; white-space: nowrap; }

  .header-nav { display: flex; align-items: center; gap: 12px; }

  .api-key-input {
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 0.85rem;
    width: 160px;
    outline: none;
  }
  .api-key-input::placeholder { color: rgba(255,255,255,0.4); }
  .api-key-input:focus { border-color: rgba(255,255,255,0.5); }

  .nav-link {
    color: #a5b4fc;
    font-size: 0.82rem;
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(165,180,252,0.3);
  }
  .nav-link:hover { background: rgba(165,180,252,0.1); }

  .user-badge { font-size: 0.82rem; color: rgba(255,255,255,0.6); }

  .btn-nav {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #e2e8f0;
    cursor: pointer;
    font-size: 0.82rem;
  }
  .btn-nav:hover { background: rgba(255,255,255,0.07); }

  .app-body { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #12122a;
    padding: 12px 10px;
    overflow-y: auto;
  }

  .sidebar-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 8px 4px;
  }

  .app-main { flex: 1; overflow: hidden; }
</style>
