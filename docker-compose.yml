services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # qdrant image has bash but no curl/wget — use the TCP probe
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: documentqa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d documentqa"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/DocumentQA.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      # "Docker" = local stack. Real production deploys must set Production
      # and provide a non-default Admin__Password (startup fails otherwise).
      - ASPNETCORE_ENVIRONMENT=Docker
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
      - OpenRouter__ApiKey=${OPENROUTER_API_KEY:-}
      - Redis__ConnectionString=${UPSTASH_REDIS_URL:-}
      - Reranker__ApiKey=${COHERE_API_KEY:-}
      - Langfuse__Enabled=${LANGFUSE_ENABLED:-false}
      - Langfuse__PublicKey=${LANGFUSE_PUBLIC_KEY:-}
      - Langfuse__SecretKey=${LANGFUSE_SECRET_KEY:-}
      - Postgres__ConnectionString=Host=postgres;Port=5432;Database=documentqa;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      - Jwt__Key=${JWT_KEY:-change-me-in-production-use-32-chars}
      - Jwt__Issuer=DocumentQA
      - Jwt__Audience=DocumentQA
      - Admin__Email=${ADMIN_EMAIL:-admin@example.com}
      - Admin__Password=${ADMIN_PASSWORD:-Admin1234!}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: on-failure

  ui:
    build:
      context: ui/document-qa-ui
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  qdrant_storage:
  postgres_data:
